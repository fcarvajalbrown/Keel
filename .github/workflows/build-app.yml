name: build-app

# Builds, tests, and (on a tag) releases Keel — GUI + VST3 plugin, in lockstep.
#
# Jobs:
#   * test    -> runs the tests/ unittest suite on Windows + macOS (release gate).
#   * build   -> desktop GUI: dist/Keel.exe + dist/KeelSetup-<ver>.exe (Windows),
#                dist/Keel.dmg (macOS arm64). Each self-tests the frozen app.
#   * plugin  -> Windows VST3: dist/Keel-VST3-windows-<ver>.zip; macOS VST3 + AU:
#                dist/Keel-plugins-macos-<ver>.zip. Both smoke-validated with
#                pluginval.
#   * release -> on a v* tag, publishes a GitHub *prerelease* with ALL the above
#                assets attached together (GUI + plugin from ONE tag).
#
# Triggered MANUALLY (Actions tab -> Run workflow) or by a version tag (v*) only
# -- never on every push, so day-to-day commits don't spam build failures. The
# build/plugin jobs depend on `test`, so a red test stops the release. The builds
# are UNSIGNED -- Windows SmartScreen / macOS Gatekeeper will warn (signing is the
# v1.0.0 gate).
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # --- Release gate: the engine test suite must pass on both OSes ------------
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install engine dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run the unittest suite
        run: python -m unittest discover -s tests -v

  # --- Desktop GUI (PyInstaller) --------------------------------------------
  build:
    name: ${{ matrix.label }}
    needs: test
    strategy:
      fail-fast: false   # one OS failing must not cancel the other
      matrix:
        include:
          - os: windows-latest
            label: windows
            artifact_name: Keel-windows-exe
            artifact_path: dist/Keel.exe
          - os: macos-latest        # Apple Silicon (arm64)
            label: macos-arm64
            artifact_name: Keel-macos-arm64-dmg
            artifact_path: dist/Keel.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-gui.txt -r requirements-build.txt

      - name: Build (PyInstaller)
        run: pyinstaller Keel.spec --noconfirm

      - name: Self-test the frozen app (Windows)
        if: runner.os == 'Windows'
        run: dist\Keel.exe --selftest

      - name: Self-test + package DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          ./dist/Keel.app/Contents/MacOS/Keel --selftest
          hdiutil create -volname Keel -srcfolder dist/Keel.app -ov -format UDZO dist/Keel.dmg

      - name: Build installer (Inno Setup, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = (Select-String -Path keel.py -Pattern '__version__\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          Write-Host "Keel version: $ver"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=$ver installer\keel.iss
          Get-ChildItem dist\KeelSetup-*.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload installer artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: Keel-windows-installer
          path: dist/KeelSetup-*.exe
          if-no-files-found: error
          retention-days: 7

  # --- Plugin (JUCE/CMake): Windows VST3 + macOS VST3 & AU ------------------
  plugin:
    name: plugin-${{ matrix.label }}
    needs: test
    strategy:
      fail-fast: false   # one OS failing must not cancel the other
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest        # Apple Silicon (arm64); builds VST3 + AU
            label: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # FetchContent pulls JUCE 8.0.9 on first configure (needs internet).
      - name: Configure + build the plugin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # No explicit -G: CMake picks the runner's installed Visual Studio.
          cmake -S plugin -B plugin/build -A x64
          cmake --build plugin/build --config Release

      - name: Configure + build the plugin (macOS)
        if: runner.os == 'macOS'
        run: |
          # Xcode generator gives JUCE the multi-config layout it expects
          # (artefacts land under .../Release/...). AU is added by CMakeLists
          # on APPLE; COPY_PLUGIN_AFTER_BUILD installs VST3 + AU into the
          # per-user plug-in folders so pluginval can find them.
          cmake -S plugin -B plugin/build -G Xcode
          cmake --build plugin/build --config Release

      - name: Smoke-validate the VST3 (pluginval, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vst3 = "plugin/build/KeelPlugin_artefacts/Release/VST3/Keel.vst3"
          if (-not (Test-Path $vst3)) { throw "VST3 not found at $vst3" }
          Invoke-WebRequest -Uri "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip" -OutFile pluginval.zip
          Expand-Archive pluginval.zip -DestinationPath pluginval -Force
          # pluginval.exe is a GUI-subsystem app, so the call operator doesn't
          # wait for it (LASTEXITCODE comes back empty). Start-Process -Wait gets
          # the real exit code. Skip GUI tests (headless runner) and cap runtime.
          $p = Start-Process -FilePath "pluginval/pluginval.exe" `
            -ArgumentList @("--strictness-level","5","--validate-in-process",
                            "--skip-gui-tests","--timeout-ms","300000",
                            "--validate","$vst3") `
            -Wait -PassThru -NoNewWindow
          Write-Host "pluginval exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "pluginval failed ($($p.ExitCode))" }

      - name: Smoke-validate the VST3 + AU (pluginval, macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          vst3="plugin/build/KeelPlugin_artefacts/Release/VST3/Keel.vst3"
          au="plugin/build/KeelPlugin_artefacts/Release/AU/Keel.component"
          for b in "$vst3" "$au"; do
            if [ ! -d "$b" ]; then echo "missing bundle: $b" >&2; exit 1; fi
          done
          curl -sSL -o pluginval.zip \
            "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip"
          unzip -q pluginval.zip -d pluginval
          PV="pluginval/pluginval.app/Contents/MacOS/pluginval"
          # COPY_PLUGIN_AFTER_BUILD installed the AU into ~/Library/.../Components;
          # validate the installed component (AU is resolved by id, not path).
          for b in "$vst3" "$HOME/Library/Audio/Plug-Ins/Components/Keel.component"; do
            echo "== validating $b =="
            "$PV" --strictness-level 5 --validate-in-process \
                  --skip-gui-tests --timeout-ms 300000 --validate "$b"
          done

      - name: Package the VST3 zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = (Select-String -Path keel.py -Pattern '__version__\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          $vst3 = "plugin/build/KeelPlugin_artefacts/Release/VST3/Keel.vst3"
          New-Item -ItemType Directory -Force dist | Out-Null
          $zip = "dist/Keel-VST3-windows-$ver.zip"
          Compress-Archive -Path $vst3 -DestinationPath $zip -Force
          Get-ChildItem dist\Keel-VST3-windows-*.zip

      - name: Package the VST3 + AU zip (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          ver=$(grep -oE '__version__\s*=\s*"[^"]+"' keel.py | grep -oE '"[^"]+"' | tr -d '"')
          echo "Keel version: $ver"
          mkdir -p dist
          # ditto -c -k --keepParent preserves the .vst3/.component bundle layout
          # (and resource forks) inside a single zip.
          ditto -c -k --keepParent \
            "plugin/build/KeelPlugin_artefacts/Release/VST3/Keel.vst3" dist/_vst3.zip
          # Stage both bundles, then zip the folder so users get Keel.vst3 +
          # Keel.component side by side.
          stage="dist/Keel-plugins-macos"
          mkdir -p "$stage"
          cp -R "plugin/build/KeelPlugin_artefacts/Release/VST3/Keel.vst3" "$stage/"
          cp -R "plugin/build/KeelPlugin_artefacts/Release/AU/Keel.component" "$stage/"
          rm -f dist/_vst3.zip
          ( cd dist && ditto -c -k --keepParent "Keel-plugins-macos" "Keel-plugins-macos-$ver.zip" )
          rm -rf "$stage"
          ls -la dist/Keel-plugins-macos-*.zip

      - name: Upload plugin artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: Keel-vst3-windows
          path: dist/Keel-VST3-windows-*.zip
          if-no-files-found: error
          retention-days: 7

      - name: Upload plugin artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: Keel-plugins-macos
          path: dist/Keel-plugins-macos-*.zip
          if-no-files-found: error
          retention-days: 7

  # Publish a GitHub prerelease with the built binaries — only on a v* tag.
  release:
    name: publish-release
    needs: [build, plugin]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the release
    steps:
      - name: Check out the repo (for the canonical release notes)
        uses: actions/checkout@v5

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          files=$(find artifacts -type f)
          echo "Attaching:"; echo "$files"
          # Single source of truth for the release notes (same text local + CI):
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Keel ${GITHUB_REF_NAME}" \
            --notes-file docs/release-notes.md \
            --prerelease \
            $files

      # Storage hygiene: each prerelease carries ~300 MB of binaries, which adds
      # up fast against the storage quota. Keep the downloadable assets on only the
      # newest 2 prereleases (the one just published + the previous, for rollback);
      # strip the heavy binaries from older ones. Release entries, notes, and git
      # tags are KEPT -- only the assets are removed, so changelog/version history
      # and old links survive (they just resolve to a notes page, not a download).
      - name: Prune old prerelease assets (keep newest 2)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          KEEP=2
          mapfile -t tags < <(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 \
                   --json tagName,isPrerelease,createdAt \
                   -q 'map(select(.isPrerelease)) | sort_by(.createdAt) | reverse | .[].tagName')
          i=0
          for t in "${tags[@]}"; do
            i=$((i+1))
            if [ "$i" -le "$KEEP" ]; then echo "keep  $t"; continue; fi
            assets=$(gh release view "$t" --repo "$GITHUB_REPOSITORY" --json assets -q '.assets[].name')
            if [ -z "$assets" ]; then echo "clean $t (no assets)"; continue; fi
            while IFS= read -r a; do
              echo "strip $t :: $a"
              gh release delete-asset "$t" "$a" --repo "$GITHUB_REPOSITORY" --yes
            done <<< "$assets"
          done
