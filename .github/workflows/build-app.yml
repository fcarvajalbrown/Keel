name: build-app

# Builds the desktop GUI into downloadable artifacts:
#   * Windows  -> dist/Keel.exe              (onefile)
#   * Windows  -> dist/KeelSetup-<ver>.exe   (Inno Setup installer, UX only — unsigned)
#   * macOS    -> dist/Keel.dmg              (.app bundle, Apple Silicon / arm64)
#
# Triggered MANUALLY (Actions tab -> Run workflow) or by a version tag (v*) only
# -- it deliberately does NOT run on every push, so day-to-day commits never
# spam build failures. Each job self-tests the frozen app before uploading, so a
# broken bundle fails its own job instead of shipping.
#
# On a v* tag, a final `release` job downloads the built artifacts and publishes
# them as a GitHub *prerelease* (assets: KeelSetup-<ver>.exe, Keel.exe, Keel.dmg).
# The builds are UNSIGNED — Windows SmartScreen / macOS Gatekeeper will warn.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false   # one OS failing must not cancel the other
      matrix:
        include:
          - os: windows-latest
            label: windows
            artifact_name: Keel-windows-exe
            artifact_path: dist/Keel.exe
          - os: macos-latest        # Apple Silicon (arm64)
            label: macos-arm64
            artifact_name: Keel-macos-arm64-dmg
            artifact_path: dist/Keel.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-gui.txt -r requirements-build.txt

      - name: Build (PyInstaller)
        run: pyinstaller Keel.spec --noconfirm

      - name: Self-test the frozen app (Windows)
        if: runner.os == 'Windows'
        run: dist\Keel.exe --selftest

      - name: Self-test + package DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          ./dist/Keel.app/Contents/MacOS/Keel --selftest
          hdiutil create -volname Keel -srcfolder dist/Keel.app -ov -format UDZO dist/Keel.dmg

      - name: Build installer (Inno Setup, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = (Select-String -Path keel.py -Pattern '__version__\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          Write-Host "Keel version: $ver"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=$ver installer\keel.iss
          Get-ChildItem dist\KeelSetup-*.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Upload installer artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: Keel-windows-installer
          path: dist/KeelSetup-*.exe
          if-no-files-found: error

  # Publish a GitHub prerelease with the built binaries — only on a v* tag.
  release:
    name: publish-release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the release
    steps:
      - name: Check out the repo (for the canonical release notes)
        uses: actions/checkout@v5

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          files=$(find artifacts -type f)
          echo "Attaching:"; echo "$files"
          # Single source of truth for the release notes (same text local + CI):
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Keel ${GITHUB_REF_NAME} (pre-alpha)" \
            --notes-file docs/release-notes.md \
            --prerelease \
            $files
