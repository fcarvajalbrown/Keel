name: build-app

# Builds, tests, and (on a tag) releases Keel — GUI + VST3 plugin, in lockstep.
#
# Jobs:
#   * test    -> runs the tests/ unittest suite on Windows + macOS (release gate).
#   * build   -> desktop GUI: dist/Keel.exe + dist/KeelSetup-<ver>.exe (Windows),
#                dist/Keel.dmg (macOS arm64). Each self-tests the frozen app.
#   * plugin  -> Windows VST3: dist/Keel-VST3-windows-<ver>.zip, smoke-validated
#                with pluginval. (macOS plugin build is a v0.5 item.)
#   * release -> on a v* tag, publishes a GitHub *prerelease* with ALL the above
#                assets attached together (GUI + plugin from ONE tag).
#
# Triggered MANUALLY (Actions tab -> Run workflow) or by a version tag (v*) only
# -- never on every push, so day-to-day commits don't spam build failures. The
# build/plugin jobs depend on `test`, so a red test stops the release. The builds
# are UNSIGNED -- Windows SmartScreen / macOS Gatekeeper will warn (signing is the
# v1.0.0 gate).
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # --- Release gate: the engine test suite must pass on both OSes ------------
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install engine dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run the unittest suite
        run: python -m unittest discover -s tests -v

  # --- Desktop GUI (PyInstaller) --------------------------------------------
  build:
    name: ${{ matrix.label }}
    needs: test
    strategy:
      fail-fast: false   # one OS failing must not cancel the other
      matrix:
        include:
          - os: windows-latest
            label: windows
            artifact_name: Keel-windows-exe
            artifact_path: dist/Keel.exe
          - os: macos-latest        # Apple Silicon (arm64)
            label: macos-arm64
            artifact_name: Keel-macos-arm64-dmg
            artifact_path: dist/Keel.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-gui.txt -r requirements-build.txt

      - name: Build (PyInstaller)
        run: pyinstaller Keel.spec --noconfirm

      - name: Self-test the frozen app (Windows)
        if: runner.os == 'Windows'
        run: dist\Keel.exe --selftest

      - name: Self-test + package DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          ./dist/Keel.app/Contents/MacOS/Keel --selftest
          hdiutil create -volname Keel -srcfolder dist/Keel.app -ov -format UDZO dist/Keel.dmg

      - name: Build installer (Inno Setup, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = (Select-String -Path keel.py -Pattern '__version__\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          Write-Host "Keel version: $ver"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=$ver installer\keel.iss
          Get-ChildItem dist\KeelSetup-*.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Upload installer artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: Keel-windows-installer
          path: dist/KeelSetup-*.exe
          if-no-files-found: error

  # --- VST3 plugin (JUCE/CMake, Windows) ------------------------------------
  plugin:
    name: plugin-windows-vst3
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure + build the plugin (Release)
        shell: pwsh
        run: |
          # No explicit -G: CMake picks the runner's installed Visual Studio.
          # FetchContent pulls JUCE 8.0.9 on first configure (needs internet).
          cmake -S plugin -B plugin/build -A x64
          cmake --build plugin/build --config Release

      - name: Smoke-validate the VST3 (pluginval)
        shell: pwsh
        run: |
          $vst3 = "plugin/build/KeelPlugin_artefacts/Release/VST3/Keel.vst3"
          if (-not (Test-Path $vst3)) { throw "VST3 not found at $vst3" }
          Invoke-WebRequest -Uri "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip" -OutFile pluginval.zip
          Expand-Archive pluginval.zip -DestinationPath pluginval -Force
          # pluginval.exe is a GUI-subsystem app, so the call operator doesn't
          # wait for it (LASTEXITCODE comes back empty). Start-Process -Wait gets
          # the real exit code. Skip GUI tests (headless runner) and cap runtime.
          $p = Start-Process -FilePath "pluginval/pluginval.exe" `
            -ArgumentList @("--strictness-level","5","--validate-in-process",
                            "--skip-gui-tests","--timeout-ms","300000",
                            "--validate","$vst3") `
            -Wait -PassThru -NoNewWindow
          Write-Host "pluginval exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "pluginval failed ($($p.ExitCode))" }

      - name: Package the VST3 zip
        shell: pwsh
        run: |
          $ver = (Select-String -Path keel.py -Pattern '__version__\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          $vst3 = "plugin/build/KeelPlugin_artefacts/Release/VST3/Keel.vst3"
          New-Item -ItemType Directory -Force dist | Out-Null
          $zip = "dist/Keel-VST3-windows-$ver.zip"
          Compress-Archive -Path $vst3 -DestinationPath $zip -Force
          Get-ChildItem dist\Keel-VST3-windows-*.zip

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: Keel-vst3-windows
          path: dist/Keel-VST3-windows-*.zip
          if-no-files-found: error

  # Publish a GitHub prerelease with the built binaries — only on a v* tag.
  release:
    name: publish-release
    needs: [build, plugin]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the release
    steps:
      - name: Check out the repo (for the canonical release notes)
        uses: actions/checkout@v5

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          files=$(find artifacts -type f)
          echo "Attaching:"; echo "$files"
          # Single source of truth for the release notes (same text local + CI):
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Keel ${GITHUB_REF_NAME}" \
            --notes-file docs/release-notes.md \
            --prerelease \
            $files
